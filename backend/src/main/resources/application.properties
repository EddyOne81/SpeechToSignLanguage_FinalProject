spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sign_language_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.servlet.multipart.max-file-size=${MAX_UPLOAD_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_SIZE:25MB}

ai.server.url=${AI_SERVER_URL:http://127.0.0.1:8000}
ai.server.max-in-memory-size=${AI_SERVER_MAX_IN_MEMORY_SIZE:200MB}
ai.server.connect-timeout-ms=${AI_CONNECT_TIMEOUT_MS:5000}
ai.server.response-timeout-s=${AI_RESPONSE_TIMEOUT_S:120}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
app.auto-cache.phrase-enabled=${APP_AUTO_CACHE_PHRASE_ENABLED:false}
app.auto-cache.max-phrase-words=${APP_AUTO_CACHE_MAX_PHRASE_WORDS:2}

jwt.secret=${JWT_SECRET:VGhpc0lzQURldk9ubHlTZWNyZXRLZXlGb3JTaWduTGFuZ3VhZ2VBcHAxMjM0NTY=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

server.port=${PORT:8080}
app.cors-allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:[*],http://127.0.0.1:[*]}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Email (SMTP) — set MAIL_USERNAME + MAIL_PASSWORD in .env to enable
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Google OAuth2 — set GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET in .env to enable
# (Configured programmatically in GoogleOAuth2Config.java to allow optional activation)
google.oauth2.client-id=${GOOGLE_CLIENT_ID:}
google.oauth2.client-secret=${GOOGLE_CLIENT_SECRET:}

# Async support for email sending
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
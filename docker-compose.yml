version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sign_language_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sign_language_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── FastAPI AI Service ────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./TestAIService
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      # Only the backend (server-side) calls this service, so CORS is limited to backend container.
      ALLOWED_ORIGINS: http://backend:8080

  # ── Spring Boot Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sign_language_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      AI_SERVER_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET:-VGhpc0lzQURldk9ubHlTZWNyZXRLZXlGb3JTaWduTGFuZ3VhZ2VBcHAxMjM0NTY=}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      MAIL_USERNAME: ${MAIL_USERNAME:}
      MAIL_PASSWORD: ${MAIL_PASSWORD:}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started

  # ── React Frontend (nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./client-ui
      args:
        # This URL is baked into the React bundle at build time.
        # Must be the URL the *browser* uses to reach the backend.
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
